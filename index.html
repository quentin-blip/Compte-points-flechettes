<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>DartsMaster Scorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
    <style>
      body {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
      }

      .transition-all {
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      }

      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }

      /* --- 1. ANIMATIONS D'IMPACT (REFINED) --- */
      
      @keyframes megaShockwave {
        0% { transform: scale(0.1); opacity: 1; box-shadow: inset 0 0 0 100px rgba(255, 255, 255, 0.8); border-width: 50px; }
        100% { transform: scale(4); opacity: 0; box-shadow: inset 0 0 0 0px rgba(255, 255, 255, 0); border-width: 1px; }
      }
      .shockwave {
        position: absolute;
        width: 150px;
        height: 150px;
        border-style: solid;
        border-radius: 50%;
        pointer-events: none;
        animation: megaShockwave 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        will-change: transform, opacity;
      }

      @keyframes bullBlast {
        0% { transform: scale(0); opacity: 0; filter: blur(20px) brightness(3); }
        15% { transform: scale(1.4); opacity: 1; filter: blur(0px) brightness(2); }
        30% { transform: scale(1.2); filter: brightness(1.5); }
        100% { transform: scale(2.5); opacity: 0; filter: blur(30px) brightness(1); }
      }
      .animate-bull-blast {
        animation: bullBlast 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        will-change: transform, opacity, filter;
      }

      @keyframes dbullBlast {
        0% { transform: scale(0) rotate(-180deg); opacity: 0; filter: brightness(5) blur(20px); }
        25% { transform: scale(1.6) rotate(10deg); opacity: 1; filter: brightness(2) blur(0px); }
        50% { transform: scale(1.4) rotate(-5deg); }
        100% { transform: scale(4); opacity: 0; filter: blur(40px); }
      }
      .animate-dbull-blast {
        animation: dbullBlast 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        will-change: transform, opacity, filter;
      }

      /* --- 2. ANIMATIONS DE FEEDBACK UI --- */

      @keyframes screenShake {
        0%, 100% { transform: translate3d(0, 0, 0); }
        10%, 30%, 50%, 70%, 90% { transform: translate3d(-8px, -4px, 0); }
        20%, 40%, 60%, 80% { transform: translate3d(8px, 4px, 0); }
      }
      .animate-shake {
        animation: screenShake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        will-change: transform;
      }

      @keyframes bustFlash {
        0% { opacity: 0; transform: scale(1.2); }
        5% { opacity: 1; transform: scale(1); }
        20% { transform: scale(1.05); }
        100% { opacity: 0; transform: scale(0.8); }
      }
      .animate-bust-text {
        animation: bustFlash 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes bustScreen {
        0% { background: rgba(239, 68, 68, 0); }
        10% { background: rgba(239, 68, 68, 0.4); }
        100% { background: rgba(239, 68, 68, 0); }
      }
      .animate-bust-screen {
        animation: bustScreen 1.5s ease-out forwards;
      }

      @keyframes scorePop {
        0% { transform: scale(1); filter: brightness(1); }
        40% { transform: scale(1.15); filter: brightness(1.3); }
        100% { transform: scale(1); filter: brightness(1); }
      }
      .animate-score-pop {
        display: inline-block;
        animation: scorePop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        will-change: transform, filter;
      }

      /* --- 3. ANIMATIONS DE TRANSITION --- */

      @keyframes viewEnter {
        from { opacity: 0; transform: scale(0.95) translateY(30px); filter: blur(10px); }
        to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0px); }
      }
      .view-enter {
        animation: viewEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes popIn {
        0% { transform: scale(0.5) translateY(20px); opacity: 0; }
        100% { transform: scale(1) translateY(0); opacity: 1; }
      }
      .animate-pop-in {
        animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      /* --- 4. ANIMATIONS DE VICTOIRE --- */

      @keyframes winnerPop {
        0% { transform: scale(0.5) translateY(100px) rotate(-10deg); opacity: 0; filter: blur(20px); }
        60% { transform: scale(1.1) translateY(-10px) rotate(2deg); opacity: 1; filter: blur(0px); }
        100% { transform: scale(1) translateY(0) rotate(0deg); opacity: 1; filter: blur(0px); }
      }
      .animate-winner-pop {
        animation: winnerPop 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        will-change: transform, opacity;
      }

      @keyframes shine {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      .victory-text {
        background: linear-gradient(90deg, #fff 0%, #34d399 50%, #fff 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shine 3s linear infinite;
      }

      @keyframes goldPulse {
        0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.8); }
        100% { box-shadow: 0 0 0 50px rgba(251, 191, 36, 0); }
      }
      .animate-gold-pulse {
        animation: goldPulse 1.5s infinite cubic-bezier(0.4, 0, 0.2, 1);
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      .animate-float {
        animation: float 3s ease-in-out infinite;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "d3": "https://aistudiocdn.com/d3@^7.9.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 transition-colors duration-700">

</body>
</html>
